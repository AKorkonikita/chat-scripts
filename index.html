<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stoiximan CS Assistant</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Stoiximan Top Navigation Bar -->
    <header class="navbar">
        <div class="nav-left">
            <img src="https://svgshare.com/i/13gz.svg" alt="Stoiximan Logo" class="brand-logo" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/a/a2/Stoiximan_logo.png'">
            <span class="app-divider">|</span>
            <span class="app-title">CS Chat Scripts</span>
        </div>
    </header>

    <div class="container">
        <!-- Sidebar Κατηγοριών -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>Κατηγορίες</h3>
            </div>
            <div id="category-buttons"></div>
        </aside>

        <!-- Κύριο Περιεχόμενο -->
        <main class="content">
            <div class="search-container">
                <input type="text" id="search-bar" placeholder="🔍 Αναζήτηση απάντησης ή λέξης-κλειδιού..." onkeyup="filterScripts()">
            </div>
            <div id="scripts-container" class="scripts-grid"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
